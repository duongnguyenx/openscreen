name: Build macOS (unsigned, personal use)

# Trigger manually from the Actions tab in GitHub.
# Produces a DMG for Apple Silicon (arm64) that's NOT codesigned —
# users will see a Gatekeeper warning and need to bypass it with
# `xattr -rd com.apple.quarantine /Applications/Openscreen.app`
# after installing. Fine for personal use; not for distribution.
on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to build'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - x64
          - both

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: ${{ github.event.inputs.arch == 'both' && fromJSON('["arm64", "x64"]') || fromJSON(format('["{0}"]', github.event.inputs.arch)) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python (needed by some native deps)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron
        run: npx tsc && npx vite build

      # Force unsigned: CSC_IDENTITY_AUTO_DISCOVERY=false makes
      # electron-builder skip codesigning even if a default identity
      # exists on the runner.
      - name: Package .app bundle (unsigned)
        run: npx electron-builder --mac --${{ matrix.arch }} --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_OUTPUT

      - name: Find .app bundle
        id: find_app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_BUNDLE=$(find "release/${VERSION}" -maxdepth 4 -name "*.app" -type d | head -n1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::No .app bundle found in release/${VERSION}/"
            exit 1
          fi
          echo "app_bundle=$APP_BUNDLE" >> $GITHUB_OUTPUT

      - name: Create unsigned DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          DMG_NAME="Openscreen-Mac-${ARCH}-${VERSION}-unsigned.dmg"
          RELEASE_DIR="release/${VERSION}"
          DMG_OUTPUT="${RELEASE_DIR}/${DMG_NAME}"
          STAGING="${RELEASE_DIR}/dmg-staging"

          mkdir -p "$STAGING"
          cp -R "${{ steps.find_app.outputs.app_bundle }}" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -srcfolder "$STAGING" \
            -volname "Openscreen" \
            -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" \
            -format UDBZ \
            "$DMG_OUTPUT"

          rm -rf "$STAGING"

          echo "dmg_path=$DMG_OUTPUT" >> $GITHUB_OUTPUT

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: openscreen-mac-${{ matrix.arch }}-unsigned
          path: ${{ steps.dmg.outputs.dmg_path }}
          retention-days: 30
